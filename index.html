<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hong Kong Trip 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        function switchDay(dayNum) {
            // 隱藏所有天數內容
            document.querySelectorAll('.day-content').forEach(c => c.style.display = 'none');
            // 顯示目標天數
            const target = document.getElementById('content-d' + dayNum);
            if (target) target.style.display = 'block';
            
            // 更新按鈕樣式
            document.querySelectorAll('.day-btn').forEach(b => {
                b.classList.remove('bg-[#6699CC]', 'text-white');
                b.classList.add('bg-white', 'text-gray-400');
            });
            const activeBtn = document.getElementById('d' + dayNum);
            if (activeBtn) {
                activeBtn.classList.add('bg-[#6699CC]', 'text-white');
                activeBtn.classList.remove('text-gray-400');
            }
        }

        function switchTab(tabId) {
            document.getElementById('itinerary-section').style.display = 'none';
            document.getElementById('guide-section').style.display = 'none';
            document.getElementById('weather-section').style.display = 'none';
            document.getElementById(tabId + '-section').style.display = 'block';
            
            ['itinerary', 'guide', 'weather'].forEach(t => {
                document.getElementById('i-' + t).style.opacity = (t === tabId) ? '1' : '0.4';
            });
        }

        function handlePhotoUpload(input, containerId) {
            const container = document.getElementById(containerId);
            if (input.files) {
                Array.from(input.files).forEach(file => {
                    const reader = new FileReader();
                    reader.onload = e => {
                        const img = document.createElement('img');
                        img.src = e.target.result;
                        img.className = 'w-20 h-20 object-cover rounded-xl border-2 border-white shadow-sm flex-shrink-0';
                        img.onclick = function() { if(confirm('刪除這張照片？')) this.remove(); };
                        container.appendChild(img);
                    }
                    reader.readAsDataURL(file);
                });
            }
        }
    </script>
    <style>
        body { font-family: 'Zen Maru Gothic', sans-serif; background-color: #F5F5F5; -webkit-tap-highlight-color: transparent; }
        .rounded-japanese { border-radius: 28px; }
        .cat-tag { font-size: 10px; font-weight: 700; padding: 2px 10px; border-radius: 99px; color: white; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
